name: CI/CD Pipeline

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'
  PNPM_VERSION: '9.15.0'

jobs:
  # Fix Dependabot lockfile issues
  # Note: github.head_ref is used safely in checkout action's ref parameter
  dependabot-lockfile:
    name: Update Lockfile (Dependabot)
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event_name == 'pull_request'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Regenerate lockfile
        run: pnpm install --no-frozen-lockfile

      - name: Check for lockfile changes
        id: lockfile-check
        run: |
          if git diff --quiet pnpm-lock.yaml; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated lockfile
        if: steps.lockfile-check.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml
          git commit -m 'chore: update pnpm-lock.yaml for Dependabot'
          git push

  # Lint and Type Check
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @crechebooks/api prisma:generate

      - name: Build shared types
        run: pnpm --filter @crechebooks/types build

      - name: Run linting
        run: pnpm lint:check

      - name: Type check API
        run: pnpm --filter @crechebooks/api exec tsc --noEmit

      - name: Type check Web
        run: pnpm --filter @crechebooks/web exec tsc --noEmit

  # API Tests
  test-api:
    name: Test API (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crechebooks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @crechebooks/api prisma:generate

      - name: Run database migrations
        run: pnpm --filter @crechebooks/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/crechebooks_test

      - name: Run API tests (shard ${{ matrix.shard }}/4)
        run: pnpm --filter @crechebooks/api exec jest --runInBand --forceExit --testPathIgnorePatterns=".e2e.spec.ts" --shard=${{ matrix.shard }}/4
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/crechebooks_test
          JWT_SECRET: test-secret-key-for-ci
          TOKEN_ENCRYPTION_KEY: test-encryption-key-for-ci-32chars!
          AUTH0_DOMAIN: test-tenant.auth0.com
          AUTH0_CLIENT_ID: test-client-id-for-ci
          AUTH0_CLIENT_SECRET: test-client-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          XERO_STATE_KEY: test-xero-state-key-for-ci-32ch!
          XERO_CLIENT_ID: test-xero-client-id
          XERO_CLIENT_SECRET: test-xero-client-secret
          NODE_ENV: test

      - name: Run API e2e tests
        if: matrix.shard == 1
        run: pnpm --filter @crechebooks/api test:e2e
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/crechebooks_test
          JWT_SECRET: test-secret-key-for-ci
          TOKEN_ENCRYPTION_KEY: test-encryption-key-for-ci-32chars!
          AUTH0_DOMAIN: test-tenant.auth0.com
          AUTH0_CLIENT_ID: test-client-id-for-ci
          AUTH0_CLIENT_SECRET: test-client-secret-for-ci
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          XERO_STATE_KEY: test-xero-state-key-for-ci-32ch!
          XERO_CLIENT_ID: test-xero-client-id
          XERO_CLIENT_SECRET: test-xero-client-secret
          NODE_ENV: test

  # Web Tests
  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Web tests
        run: pnpm --filter @crechebooks/web test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Upload Web coverage
        uses: codecov/codecov-action@v6
        with:
          files: ./apps/web/coverage/lcov.info
          flags: web
          name: web-coverage

  # Build Applications
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [lint, test-api, test-web]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @crechebooks/api prisma:generate

      - name: Build shared types
        run: pnpm --filter @crechebooks/types build

      - name: Build API
        run: pnpm --filter @crechebooks/api build

      - name: Build Web
        run: pnpm --filter @crechebooks/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

      - name: Upload API build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: api-build
          path: apps/api/dist
          retention-days: 7

      - name: Upload Web build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: web-build
          path: apps/web/.next
          retention-days: 7

  # Playwright browser E2E — currently OPTIONAL / non-blocking.
  # Intentionally not wired into the ci-summary required set until the suite
  # has been observed as stable across several runs. Report failures visibly
  # via the HTML artifact so authors see them without blocking the PR merge.
  playwright-e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [build]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: crechebooks_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      # Test infra
      DATABASE_URL: postgresql://test:test@localhost:5432/crechebooks_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NODE_ENV: test
      # API auth — JWT provider + dev-login enabled so Playwright can sign in
      # without Auth0 credentials.
      AUTH_PROVIDER: jwt
      DEV_AUTH_ENABLED: 'true'
      JWT_SECRET: test-secret-key-for-ci-playwright-32chars!
      JWT_EXPIRES_IN: 7d
      TOKEN_ENCRYPTION_KEY: test-encryption-key-for-ci-32chars!
      ENCRYPTION_KEY: test-encryption-key-for-playwright-ci-32chars!
      # Auth0 / Xero secrets required by config validation even in jwt mode
      AUTH0_DOMAIN: test-tenant.auth0.com
      AUTH0_CLIENT_ID: test-client-id-for-ci
      AUTH0_CLIENT_SECRET: test-client-secret-for-ci
      XERO_STATE_KEY: test-xero-state-key-for-ci-32ch!
      XERO_CLIENT_ID: test-xero-client-id
      XERO_CLIENT_SECRET: test-xero-client-secret
      # Kill every outbound comms path — Playwright must never trigger email/WA/SMS
      COMMS_DISABLED: 'true'
      APP_ENV: test
      # Dev-login fixture user (matches apps/api/prisma/seed-e2e.ts)
      # Password: CrecheBooks2026!
      DEV_USER_1_EMAIL: admin@crechebooks.dev
      DEV_USER_1_PASSWORD_HASH: $2b$10$832vAOfUH58hxxMEoSU2buJilwW8GNPAQ1BrArlG2/gwyNqeC3Sty
      DEV_USER_1_NAME: E2E Admin
      DEV_USER_1_ROLE: ADMIN
      # Playwright side
      E2E_TEST_EMAIL: admin@crechebooks.dev
      E2E_TEST_PASSWORD: CrecheBooks2026!
      PLAYWRIGHT_BASE_URL: http://localhost:3001
      # Point Web at the local API
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_ENABLE_DEV_LOGIN: 'true'
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: test-nextauth-secret-min-32-chars-long!
      # CORS: allow web -> api
      CORS_ALLOWED_ORIGINS: http://localhost:3001

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @crechebooks/api prisma:generate

      - name: Build shared types
        run: pnpm --filter @crechebooks/types build

      - name: Run database migrations
        run: pnpm --filter @crechebooks/api exec prisma migrate deploy

      - name: Seed E2E fixtures
        run: pnpm --filter @crechebooks/api exec tsx prisma/seed-e2e.ts

      - name: Build API
        run: pnpm --filter @crechebooks/api build

      # NOTE: We intentionally DO NOT run `next build` here — the production
      # build tree-shakes `process.env.NODE_ENV === 'production'` to a constant
      # `true`, which makes middleware.ts always look for the __Secure-prefixed
      # session cookie. On plain HTTP (which CI serves) Auth.js writes to the
      # unprefixed cookie name (protocol check at runtime), so the built
      # middleware can't find the token and 307-redirects every protected route
      # to /login. Running `next dev` keeps NODE_ENV=test at runtime for the
      # middleware, cookie names match, auth works, tests pass.
      # The general "Build Applications" job on this workflow still validates
      # that `pnpm --filter @crechebooks/web build` succeeds.

      - name: Install Playwright browsers
        run: pnpm --filter @crechebooks/web exec playwright install --with-deps chromium

      - name: Start API server
        # NOTE: apps/api's `start:prod` script points at `dist/main` which is stale —
        # the real entrypoint is `dist/src/main.js` (start.sh in prod calls that).
        # Invoke node directly so this doesn't silently break.
        run: |
          nohup node apps/api/dist/src/main.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          echo "API PID: $(cat /tmp/api.pid)"

      - name: Start Web server (dev mode)
        # `next dev` avoids the middleware constant-fold that breaks auth in a
        # production build served over HTTP — see note above the previous step.
        # PORT=3001 so PLAYWRIGHT_BASE_URL=http://localhost:3001 still points here.
        run: |
          nohup env PORT=3001 pnpm --filter @crechebooks/web exec next dev -p 3001 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          echo "Web PID: $(cat /tmp/web.pid)"

      - name: Wait for API (port 3000) and Web (port 3001)
        run: |
          set -e
          for port in 3000 3001; do
            echo "Waiting for port $port..."
            for i in $(seq 1 60); do
              if nc -z localhost $port; then
                echo "Port $port is up (after ${i}s)"
                break
              fi
              sleep 1
              if [ $i -eq 60 ]; then
                echo "::error::Port $port did not come up in 60s"
                echo "=== /tmp/api.log ==="
                tail -100 /tmp/api.log || true
                echo "=== /tmp/web.log ==="
                tail -100 /tmp/web.log || true
                exit 1
              fi
            done
          done
          # Additional API health check
          curl -sS http://localhost:3000/health | head -c 200 || echo "(health endpoint response above)"
          # Wait until next dev has actually compiled the login route.
          # A TCP-open on 3001 doesn't mean the app is ready to serve — next dev
          # accepts connections while still compiling, and Playwright's login
          # helper otherwise races against the first-page compile and times out.
          echo ""
          echo "Waiting for next dev to compile /login..."
          for i in $(seq 1 120); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/login || echo 000)
            if [ "$code" = "200" ]; then
              echo "Web /login served 200 after ${i}s"
              break
            fi
            sleep 1
            if [ $i -eq 120 ]; then
              echo "::error::Web /login did not compile in 120s (last code=$code)"
              echo "=== /tmp/web.log ==="
              tail -100 /tmp/web.log || true
              exit 1
            fi
          done

      - name: Run Playwright tests
        run: pnpm --filter @crechebooks/web exec playwright test

      - name: Stop servers
        if: always()
        run: |
          [ -f /tmp/api.pid ] && kill $(cat /tmp/api.pid) 2>/dev/null || true
          [ -f /tmp/web.pid ] && kill $(cat /tmp/web.pid) 2>/dev/null || true

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

      - name: Upload server logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-server-logs
          path: |
            /tmp/api.log
            /tmp/web.log
          retention-days: 7

  # Docker Build (PR only)
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: crechebooks-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: crechebooks-web:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # CI Summary - single required status check for branch protection
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test-api, test-web, build]
    steps:
      - name: Check job results
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint & Type Check | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test API | ${{ needs.test-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test Web | ${{ needs.test-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Write CI results artifact
        run: |
          cat > ci-results.json << 'JSONEOF'
          {
            "workflow": "CI/CD Pipeline",
            "ref": "${{ github.ref }}",
            "sha": "${{ github.sha }}",
            "event": "${{ github.event_name }}",
            "jobs": {
              "lint": "${{ needs.lint.result }}",
              "test-api": "${{ needs.test-api.result }}",
              "test-web": "${{ needs.test-web.result }}",
              "build": "${{ needs.build.result }}"
            },
            "timestamp": "${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}"
          }
          JSONEOF

      - name: Upload CI results
        uses: actions/upload-artifact@v7
        with:
          name: ci-results
          path: ci-results.json
          retention-days: 30

      - name: Fail if any required job failed
        if: >-
          needs.lint.result == 'failure' ||
          needs.test-api.result == 'failure' ||
          needs.test-web.result == 'failure' ||
          needs.build.result == 'failure'
        run: |
          echo "One or more required jobs failed."
          exit 1
