weakly_tested_areas:
  - "LLM paths in conversational, extraction-validator, sars-agent — never exercised (stubs)"
  - "payment-matcher and transaction-categorizer LLM paths — mocked but not guarded against removal"
  - "SARS humanExplanation source labeling — no test verifies the absence of source marker"

pre_commit:
  husky:        "Not configured. No git hooks."
  lint_staged:  "Not configured."
  manual:       "Run `pnpm lint` and `pnpm type-check` before pushing."

session_observations: []

open_questions:
