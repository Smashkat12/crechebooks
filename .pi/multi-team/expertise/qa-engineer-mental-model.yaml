# QA-engineer mental model — CrecheBooks

test_layout:
  api_unit:        "apps/api/tests/**/*.spec.ts"
  api_e2e:         "apps/api/test/**/*.e2e(-|.)spec.ts (jest --config test/jest-e2e.json)"
  api_setup:       "apps/api/test/jest-setup.ts"
  web_unit:        "apps/web/src/__tests__/**/*.test.ts"
  web_e2e:         "apps/web/e2e/**/*.spec.ts (Playwright)"
  cli:             "packages/cli/ — vitest"
  naming:          "*.spec.ts (api), *.test.ts (web). Unit & e2e mirror src/."

test_command_cheatsheet:
  all:                "pnpm test"
  cov:                "pnpm test:cov"
  api:                "pnpm test:api"
  web:                "pnpm test:web"
  api_e2e:            "cd apps/api && npm run test:e2e"
  web_e2e:            "cd apps/web && npm run test:e2e"
  web_e2e_headed:     "cd apps/web && npm run test:e2e:headed"
  web_e2e_ui:         "cd apps/web && npm run test:e2e:ui"
  single_api_file:    "cd apps/api && npx jest path/to/file.spec.ts"
  single_web_file:    "cd apps/web && npx jest path/to/file.test.ts"
  lint:               "pnpm lint"
  type_check_api:     "cd apps/api && npm run type-check"
  type_check_web:     "cd apps/web && npm run type-check"

ci:
  trigger: "PR → main, push → main. Concurrency cancels in-progress on same ref."
  required_checks: "lint+type-check → test-api (4 shards) + test-web → build → ci-summary"
  api_test_sharding: "4-shard matrix, continue-on-error (FK cleanup flake)"
  web_test_coverage: "Codecov upload from apps/web/coverage/lcov.info"
  pr_only: "docker-build smoke test (no push)"

env_drift_notes:
  - "Local dev uses Postgres 16 + pgvector via docker-compose.dev.yml on port 5433."
  - "CI uses Postgres test service. No version drift documented."
  - "Some tests need real Postgres — no in-memory fallback."

flaky_tests:
  - test: "apps/api/test/* — FK constraint cleanup race"
    reason: "Tests don't fully cascade-delete or wrap in transactions; jest-e2e.json runs continue-on-error"
    fix_direction: "Wrap each test in `prisma.$transaction` and rollback in afterEach"

skipped_tests:
  - file: "apps/web/src/__tests__/date-utils.test.ts"
    why:  "it.skip — function has internal bug. Investigate."
  - file: "apps/api/tests/audit-log.service.spec.ts"
    why:  "it.skip x2 — PostgreSQL RULES not available in test env"
  - file: "apps/api/tests/tesseract-ocr-parser.spec.ts"
    why:  "it.skip — real PDF processing too heavy for test"

regression_history: []

