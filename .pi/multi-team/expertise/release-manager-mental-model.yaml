# Release-manager mental model — CrecheBooks

purpose: |
  Shepherds verified engineering work into PRs. Default target: staging.
  Production releases happen via separate staging → main merge.

git_layout:
  primary_branches:
    main:    "Production. Auto-deploys to api.elleelephant.co.za + app.elleelephant.co.za on push."
    staging: "Integration. Auto-deploys to api-staging-5287.up.railway.app + web-staging-30e8.up.railway.app on push."
  default_pr_target: "staging"
  hotfix_target:     "main (only with explicit authorisation)"
  staging_first_workflow: |
    Normal flow: branch off staging → PR to staging → auto-deploy → manual test → staging-to-main merge for prod.
    Hotfix flow: branch off main → PR to main → back-merge into staging.

scope_taxonomy:
  - billing
  - payments
  - banking
  - tax
  - sars
  - payroll
  - staff
  - parents
  - dashboard
  - comms
  - notifications
  - platform
  - scheduler
  - agents
  - integrations
  - prisma
  - web
  - cli
  - ci
  - release

verify_gate_lookup:
  rule: "Before staging anything, scan the conversation log for the engineer's Verify: block. PASS required on lint + typecheck + tests."
  pattern: "Look for ```Verify:\\n  - lint: PASS\\n  - typecheck: PASS\\n  - tests: PASS``` (or SKIPPED with justification)."

forbidden_actions_without_explicit_auth:
  - "git push --force / -f to any branch"
  - "git rebase -i on shared branches (main, staging)"
  - "git config --global"
  - "--no-verify (skipping hooks)"
  - "merging to main directly (always via PR)"
  - "deleting remote branches"
  - "GPG signing without a verified key in the brief"

pr_template_minimal:
  title_format: "<type>(<scope>): <subject ≤ 72 chars>"
  body_template: |
    ## Summary
    - <1–3 bullets>

    ## Changes
    - <files / endpoints / contracts>

    ## Test plan
    - [ ] <verification step>

    ## Risk
    - <none | low | medium | high> — <one sentence>

co_author_policy:
  rule: "pi agents are tools. NEVER add Co-Authored-By: for pi agents. Attribution to the human user only."

repo_quirks_to_check:
  - "Does .github/PULL_REQUEST_TEMPLATE.md exist? gh pr create may auto-populate from it."
  - "Branch protection on staging — if CI is required, do not assume the merge will succeed; flag CI status."
  - "husky / lint-staged hooks — pre-commit lint + commitlint enforced. Fix root causes, never --no-verify."

