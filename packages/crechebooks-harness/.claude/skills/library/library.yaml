# library.yaml — the reference catalog for the crechebooks-harness agentics.
#
# This file stores REFERENCES, not copies. Each entry points at where the piece
# actually lives: a git repo (`source: git@github.com:org/repo.git` or an https
# URL) plus the `path` inside it, or a local filesystem path (`source: local`).
# Keep one source of truth; sync pulls the latest. See SKILL.md for the workflow.

version: 1

# Where each primitive installs by default when `library use` is given no target.
# Note: Claude Code stores prompts under `commands/`, not `prompts/`.
defaults:
  skills:   .claude/skills
  agents:   .claude/agents
  commands: .claude/commands

# Optional named install targets — route a primitive somewhere non-default.
# Usage: `library use <name> into global`  /  `library use <name> into here`
targets:
  global: ~/.claude
  here:   .claude

# ──────────────────────────────────────────────────────────────────────────────
# Seeded with this harness's own agentics (local references). Replace `local`
# sources with a private git repo once you publish them, e.g.:
#   source: git@github.com:your-org/agentics.git
#   path:   skills/plan-change
# ──────────────────────────────────────────────────────────────────────────────

skills:
  - name: plan-change
    source: local
    path: packages/crechebooks-harness/.claude/skills/plan-change
    tags: [coding, planning]
  - name: evolve
    source: local
    path: packages/crechebooks-harness/.claude/skills/evolve
    tags: [meta, darwin]
  - name: library
    source: local
    path: packages/crechebooks-harness/.claude/skills/library
    tags: [meta, distribution]

agents:
  - name: architect
    source: local
    path: packages/crechebooks-harness/src/agents/architect.ts
    tags: [coding, design]
  - name: implementer
    source: local
    path: packages/crechebooks-harness/src/agents/implementer.ts
    tags: [coding]
  - name: reviewer
    source: local
    path: packages/crechebooks-harness/src/agents/reviewer.ts
    tags: [coding, review]
  - name: test-writer
    source: local
    path: packages/crechebooks-harness/src/agents/test-writer.ts
    tags: [coding, testing]

commands:
  - name: review-diff
    source: local
    path: packages/crechebooks-harness/.claude/commands/review-diff.md
    tags: [coding, review]
  - name: doctor
    source: local
    path: packages/crechebooks-harness/.claude/commands/doctor.md
    tags: [ops]
